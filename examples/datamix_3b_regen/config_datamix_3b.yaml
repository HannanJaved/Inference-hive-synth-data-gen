# inference-hive config: 3B regeneration, 16 shards × 1 GPU.

job_name: "datamix-synth-3b-regen"
partition: "alpha"
account: ""
qos: ""
cpus_per_node: 6
memory_per_node: "64G"
gres_per_node: "gpu:1"
time_limit: "2-00:00:00"
additional_sbatch_args: {}

num_inference_servers: 16
num_nodes_per_inference_server: 1

pixi_manifest:
pixi_env:
env_activation_command: |
  module load CUDA
  source /data/horse/ws/hama901h-whittle/cache.sh
  source /data/horse/ws/hama901h-whittle/inference-hive/.venv/bin/activate
env_vars:
  HF_HUB_OFFLINE: "1"
  VLLM_DISABLE_COMPILE_CACHE: "1"
  TOKENIZERS_PARALLELISM: "false"
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"

inference_server_command: >
  python -m vllm.entrypoints.openai.api_server
  --host=localhost
  --port=$IH_PORT
  --model="/data/horse/ws/hama901h-whittle/.cache/huggingface/hub/models--openeurollm--datamix-9b-80-20/snapshots/66c3229e708857a0bc54070131d4b1762d4f5279"
  --tensor-parallel-size=1
  --data-parallel-size=1
  --max-model-len=2048
  --trust-remote-code
  --gpu-memory-utilization=0.9
  --max-log-len=10

health_check_max_wait_minutes: 20
health_check_interval_seconds: 20

api_base_url: "http://localhost:${IH_PORT}/v1"
api_type: "completion"
model: "/data/horse/ws/hama901h-whittle/.cache/huggingface/hub/models--openeurollm--datamix-9b-80-20/snapshots/66c3229e708857a0bc54070131d4b1762d4f5279"

dataset_type: "hf-disk"
dataset_path: "/data/horse/ws/hama901h-whittle/inference-hive/examples/datamix_3b_regen/dataset/datamix-synth-completion"
id_column_name: "id"
input_column_name: "prompt"
apply_udf:
apply_udf_kwargs: {}
dataset_kwargs: {}

output_path: "/data/horse/ws/hama901h-whittle/inference-hive/examples/datamix_3b_regen/ih_outputs"

completions_kwargs:
  temperature: 0.85
  top_p: 0.92
  max_tokens: 1536

max_connections: 16
max_retries: 3
num_workers: 2
