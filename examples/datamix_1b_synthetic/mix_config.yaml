# Datamix synthetic 1B-token pipeline configuration.
# Fractions mirror Datamix pretraining mix:
#   72% English (Nemotron-CC style)
#   7.2% Code (StarCoder style)
#   10.4% Math (FineMath 4+ style)
#   10.4% Multilingual (HPLT 2.0 style, 36 languages)

total_tokens: 1_000_000_000

english_fraction: 0.72
code_fraction: 0.072
math_fraction: 0.104
multilingual_fraction: 0.104

seed: 42
max_seq_len: 2048
max_prompt_tokens_reserve: 512
max_completion_tokens: 1536

# Expected average completion length per domain (used for prompt budgeting).
avg_tokens:
  english: 900
  code: 700
  math: 600
  multilingual: 800

# Generator + tokenizer: Datamix 9B (local HF checkpoint).
generator_model_path: "/data/horse/ws/hama901h-whittle/.cache/huggingface/hub/models--openeurollm--datamix-9b-80-20/snapshots/66c3229e708857a0bc54070131d4b1762d4f5279"
tokenizer_name_or_path: "/data/horse/ws/hama901h-whittle/.cache/huggingface/hub/models--openeurollm--datamix-9b-80-20/snapshots/66c3229e708857a0bc54070131d4b1762d4f5279"

# Deduplication (exact + character-shingle MinHash near-dup).
dedup_prompts: true
dedup_outputs: true
dedup_prompt_near_threshold: 0.85   # template-aware near-dup on folded prompt skeleton
dedup_output_near_threshold: 0.78   # stricter near-dup on generated completions
dedup_shingle_size: 5
dedup_prompt_max_resamples: 150

# DCLM CORE benchmark decontamination (13-word n-gram overlap).
decontam_enabled: true
decontam_ngram_size: 13
# decontam_benchmark_index: benchmarks/dclm_core_13gram_index.pkl

# Override paths relative to DATAMIX_SYNTH_ROOT if needed.
paths:
  root: "."

# 36 EU + partner languages (HPLT 2.0 style). Edit to match your HPLT subset.
languages:
  bg: Bulgarian
  cs: Czech
  da: Danish
  de: German
